name: Create Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: create-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Read package version
        id: version
        run: |
          version=$(python3 -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check whether release already exists
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            is_draft=$(gh release view "$tag" --json isDraft -q .isDraft)
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "is_draft=$is_draft" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "is_draft=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish existing draft release
        if: steps.guard.outputs.exists == 'true' && steps.guard.outputs.is_draft == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ steps.version.outputs.tag }}" --draft=false

      - name: Create GitHub release
        if: steps.guard.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --target "${{ github.event.workflow_run.head_sha || github.sha }}"
