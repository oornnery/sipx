# rumdl configuration file
# See: https://github.com/rvben/rumdl#configuration

[rules]
# Select specific rules (empty = all rules)
select = []

# Ignore specific rules
ignore = []

# Rule-specific configuration
[rules.MD013]
line_length = 0
code_blocks = false
tables = false

[rules.MD003]
style = "atx" # Use ATX style headings (##)

[rules.MD007]
indent = 4 # 4 spaces for unordered list indentation

# File patterns to include/exclude
[files]
include = ["**/*.md", "**/*.markdown"]
exclude = ["node_modules/**", "target/**", "build/**", "dist/**"]
