;================================ PJSIP.CONF ==================================
; PJSIP configuration for sipx testing with 3 authentication policies
; Users: 1111 (auth all), 2222 (OPTIONS open), 3333 (strict)

[global]
type=global
max_forwards=70
user_agent=Asterisk-SIPX-Test
default_outbound_endpoint=default_endpoint

; ================================ TRANSPORTS ==================================

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

; ================================ ACLs ========================================
; Allow private networks and localhost (Docker and host)

[acl-local]
type=acl
deny=0.0.0.0/0.0.0.0
permit=192.168.0.0/16
permit=172.16.0.0/12
permit=10.0.0.0/8
permit=127.0.0.0/8

; ================================ TEMPLATES ===================================

[endpoint-base](!)
type=endpoint
context=sipx-test
disallow=all
allow=ulaw
allow=alaw
allow=gsm
allow=g722
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
ice_support=yes
allow_subscribe=yes

[auth-userpass](!)
type=auth
auth_type=userpass
realm=asterisk

[aor-default](!)
type=aor
max_contacts=5
remove_existing=yes
qualify_frequency=60

; ================================ IDENTIFICATION ==============================
; No identify sections — all users authenticate via Digest auth.
; Asterisk identifies endpoints from the From header + auth credentials.

; ================================ USER 1111 ===================================
; Auth required for ALL methods (REGISTER, OPTIONS, INVITE)

[1111](endpoint-base)
aors=1111
auth=auth1111

[auth1111](auth-userpass)
password=1111xxx
username=1111

[1111](aor-default)

; ================================ USER 2222 ===================================
; OPTIONS without auth, REGISTER/INVITE with auth

[2222](endpoint-base)
aors=2222
auth=auth2222
acl=acl-local
trust_id_inbound=yes

[auth2222](auth-userpass)
password=2222xxx
username=2222

[2222](aor-default)

; ================================ USER 3333 ===================================
; Strict security, OPTIONS rejected in dialplan

[3333](endpoint-base)
aors=3333
auth=auth3333

[auth3333](auth-userpass)
password=3333xxx
username=3333

[3333](aor-default)

; ================================ DEFAULT =====================================

[default_endpoint]
type=endpoint
context=sipx-test
disallow=all
allow=ulaw
allow=alaw
transport=transport-udp
