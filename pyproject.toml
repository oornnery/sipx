[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sipx"
dynamic = ["version"]
description = "Modern, high-performance SIP library for Python — httpx-inspired API, async-native, IVR, RTP, DTMF"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Fabio Souza", email = "oornnery@gmail.com" }]
keywords = ["sip", "voip", "rtp", "dtmf", "ivr", "asterisk", "telephony", "async"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Communications :: Telephony",
    "Topic :: Internet",
    "Framework :: AsyncIO",
]
dependencies = [
    "rich>=14.1.0",
    "typer>=0.17.4",
]

[project.optional-dependencies]
tui = ["textual[syntax]>=8.0"]

[project.urls]
Homepage = "https://github.com/oornnery/sipx"
Repository = "https://github.com/oornnery/sipx"
Issues = "https://github.com/oornnery/sipx/issues"
Changelog = "https://github.com/oornnery/sipx/blob/master/CHANGELOG.md"

[project.scripts]
sipx = "sipx.main:main"

[dependency-groups]
dev = [
    "fastapi[standard]>=0.135.2",
    "pre-commit>=4.3.0",
    "ruff>=0.12.12",
    "taskipy>=1.14.1",
    "ty>=0.0.1a20",
]
test = ["pytest>=8.4.2", "pytest-asyncio>=1.1.0", "pytest-cov>=6.3.0"]

[tool.taskipy.tasks]
# Quality
lint = "ruff check sipx/ tests/ examples/"
format = "ruff format sipx/ tests/ examples/"
check = "ruff format --check sipx/ tests/ examples/ && ruff check sipx/ tests/ examples/"
typecheck = "ty check"

# Test
test = "pytest tests/ -v"
test-asterisk = "ASTERISK_INTEGRATION=1 pytest tests/integration/test_asterisk.py -v"
cov = "pytest tests/ --cov=sipx --cov-report=term-missing"
cov-html = "pytest tests/ --cov=sipx --cov-report=html && open htmlcov/index.html"

# CI (run in order)
ci = "task check && task test"

[tool.setuptools]
package-dir = { "" = "." }

[tool.setuptools.dynamic]
version = { attr = "sipx._version.__version__" }

[tool.setuptools.packages.find]
where = ["."]
include = ["sipx*"]
exclude = ["docker*", "docs*", "examples*", "tests*"]

[tool.setuptools.package-data]
sipx = ["py.typed"]
